<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Weather App</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body>
    <div
      class="h-screen w-screen bg-neutral-700 flex justify-center items-center box-border"
    >
      <div
        class="h-3/4 w-md rounded-lg bg-linear-to-b from-teal-500 to-indigo-300 text-white px-4 pt-8"
      >
        <div class="flex items-center justify-center gap-2">
          <input
            id="search-input"
            class="w-[250px] rounded-full bg-white/80 text-slate-600 text-sm px-6 py-2.5 outline-none"
            type="text"
            placeholder="Enter Your Location"
          />
          <button
            id="search-btn"
            class="text-slate-500 bg-white/80 rounded-full p-0.5 active:scale-95"
          >
            <svg
              class="h-8 w-8"
              xmlns="http://www.w3.org/2000/svg"
              viewBox="0 0 640 640"
              fill="currentColor"
            >
              <path
                d="M480 272C480 317.9 465.1 360.3 440 394.7L566.6 521.4C579.1 533.9 579.1 554.2 566.6 566.7C554.1 579.2 533.8 579.2 521.3 566.7L394.7 440C360.3 465.1 317.9 480 272 480C157.1 480 64 386.9 64 272C64 157.1 157.1 64 272 64C386.9 64 480 157.1 480 272zM272 416C351.5 416 416 351.5 416 272C416 192.5 351.5 128 272 128C192.5 128 128 192.5 128 272C128 351.5 192.5 416 272 416z"
              />
            </svg>
          </button>
        </div>
        <h1 id="visible" class="text-5xl text-center mt-48">
          Search Your City
        </h1>
        <h1 id="error" class="hidden text-5xl text-center mt-48 text-red-500">
          Error-display
        </h1>
        <div id="info" class="hidden h-9/10 w-full flex flex-col items-center">
          <img
            id="weather-img"
            class="h-36 w-36 mt-6"
            src="assets/rain.png"
            alt="rain"
          />
          <h1 class="text-7xl mt-4"><span id="temperature">22</span>°c</h1>
          <h2 id="location" class="text-5xl mt-4">Delhi</h2>
          <div
            class="w-full flex justify-around bg-white/30 rounded-lg mt-auto p-2"
          >
            <div>
              <img class="h-24 w-24" src="assets/humidity.png" alt="humidity" />
              <div class="text-center">
                <p>
                  <span id="humidity"> 50</span>
                  %
                </p>
                <p>Humidity</p>
              </div>
            </div>
            <div>
              <img class="h-24 w-24" src="assets/wind.png" alt="humidity" />
              <div class="text-center">
                <p><span id="wind-speed">15</span>km/h</p>
                <p>Wind Speed</p>
              </div>
            </div>
          </div>
        </div>
      </div>
    </div>
    <script type="module" src="script.js"></script>
  </body>
</html>
